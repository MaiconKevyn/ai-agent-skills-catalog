  <rect x="1" y="1" width="1198" height="518" rx="31" stroke="#27324D" stroke-width="2"/>
  <path d="M0 410C150 340 240 382 360 312C505 228 584 136 724 172C874 210 944 342 1200 260V520H0V410Z" fill="#101A33"/>
  <path d="M0 118C172 54 293 76 416 126C571 190 683 218 824 146C950 82 1058 74 1200 104" stroke="#1E8A78" stroke-width="2" stroke-opacity=".45"/>
  <path d="M56 434C194 376 326 404 438 330C566 246 642 202 778 236C918 271 1006 378 1144 302" stroke="#7C5CFF" stroke-width="2" stroke-opacity=".5"/>

  <g filter="url(#glow)">
